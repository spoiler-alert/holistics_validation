name: Expire caches older than a defined value

on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: {}

permissions:
  actions: write
  pull-requests: read

env:
  RETENTION_HOURS: 12

jobs:
  cleanup:
    runs-on: ubuntu-slim
    steps:
      - name: Delete unused caches
        uses: actions/github-script@v8
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            console.log(`Caches in ${context.repo.repo}: ${caches.data.total_count}`);
            let deletedCount = 0;
            const retentionHours = parseInt('${{ env.RETENTION_HOURS }}');
            const retentionLimit = new Date();
            retentionLimit.setHours(retentionLimit.getHours() - retentionHours);
            for (const cache of caches.data.actions_caches) {
              const lastUsed = new Date(cache.created_at);
              if (lastUsed < retentionLimit) {
                console.log(`Deleting old cache: ${cache.key} from ${cache.ref}`);
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id
                });
                deletedCount++;
              }
            }
            console.log(`Cache cleanup completed! Deleted ${deletedCount} caches.`);
